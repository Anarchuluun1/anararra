<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Уухуу найз?</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #1a1a1a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: sans-serif;
    }
    @keyframes floatUp {
      0% { transform: translateY(500px) scale(1); opacity: 1; }
      100% { transform: translateY(-100px) scale(1.2); opacity: 0; }
    }
    .emoji-particle {
      position: fixed;
      font-size: 32px;
      animation: floatUp linear forwards;
      pointer-events: none;
      z-index: 999;
    }
    button {
      font-size: 16px;
      padding: 12px 32px;
      border-radius: 12px;
      cursor: pointer;
      background: #2a2a2a;
      color: #fff;
      border: 0.5px solid #444;
    }
    button:hover { background: #333; }
    .main {
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      padding: 3rem 1rem; gap: 2rem;
    }
    .main h2 { font-size:22px; font-weight:500; color:#fff; text-align:center; }
    .main p { font-size:16px; color:#aaa; text-align:center; }
    #msg { font-size:18px; color:#aaa; min-height:28px; text-align:center; }
    .btn-container {
      position: relative;
      width: 100%;
      height: 120px;
      display:flex; gap:1rem; flex-wrap:wrap; justify-content:center;
    }
    #no-btn {
      position: absolute;
      left: 0;
      top: 0;
    }
  </style>
</head>
<body>
  <div id="main" class="main">
    <h2>Уухуу найз? 🤝</h2>
    <p>Аль нэгийг нь сонго!</p>
    <div class="btn-container">
      <button id="yes-btn">✅ Тийм</button>
      <button id="no-btn">❌ Үгүй</button>
    </div>
    <p id="msg"></p>
  </div>

  <script>
    const noBtn = document.getElementById('no-btn');
    const yesBtn = document.getElementById('yes-btn');
    const msg = document.getElementById('msg');
    let attempts = 0;

    const messages = [
      "Хүүшш найз! 😄",
      "Дахиад оролд! 😂",
      "Ойртож байна... гэхдээ бас биш 😆",
      "Гараа хөдөлгөж чадахгүй болж байна уу? 😜",
      "Тийм гээд дарчих л даа! 🥹",
      "Найз надтай уумааргүй байгаа юм уу?",
      "Удаан байна даа!"
    ];

    function moveBtn() {
      attempts++;
      const container = noBtn.parentElement;
      const rect = container.getBoundingClientRect();
      const btnRect = noBtn.getBoundingClientRect();
      const maxX = rect.width - btnRect.width - 20;
      const maxY = rect.height - btnRect.height - 20;
      const randomX = Math.floor(Math.random() * maxX);
      const randomY = Math.floor(Math.random() * maxY);
      noBtn.style.left = randomX + "px";
      noBtn.style.top = randomY + "px";
      msg.textContent = messages[Math.min(attempts - 1, messages.length - 1)];
    }

    function spawnEmojis() {
      const emojis = ['🍺','🍺','🍺','🍻','🍺','🍺','🍻','🍺'];
      let count = 0;
      const interval = setInterval(() => {
        if (count > 60) { clearInterval(interval); return; }
        const el = document.createElement('div');
        el.className = 'emoji-particle';
        el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        el.style.left = Math.random() * 100 + 'vw';
        el.style.animationDuration = (2 + Math.random() * 3) + 's';
        el.style.animationDelay = (Math.random() * 0.5) + 's';
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 5000);
        count++;
      }, 80);
    }

    function handleYes() {
      spawnEmojis();
      document.getElementById('main').innerHTML = `
        <div style="display:flex; flex-direction:column; align-items:center; gap:1rem; padding:3rem 1rem;">
          <div style="font-size:48px;">🍺</div>
          <h2 style="font-size:22px; font-weight:500; color:#fff; text-align:center;">Эртхэн ингээл дарчихгүй</h2>
          <p style="font-size:16px; color:#aaa; text-align:center;">Хаана, хэзээ вэ найз?</p>
        </div>
      `;
    }

    noBtn.addEventListener('click', moveBtn);
    noBtn.addEventListener('touchstart', moveBtn);
    yesBtn.addEventListener('click', handleYes);
  </script>
</body>
</html>
